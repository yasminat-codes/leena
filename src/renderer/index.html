<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://api.openai.com; media-src 'self' blob:; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brah</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script type="module" src="./renderer.js"></script>
  </head>
  <body>
    <main id="app-shell" class="app-shell" data-mode="idle" data-panel="open">
      <section id="panel" class="panel" hidden aria-label="Brah activity">
        <header class="panel-header">
          <button
            id="menu-toggle"
            type="button"
            class="menu-button"
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="Open menu"
          >
            <span class="menu-glyph" aria-hidden="true"></span>
          </button>
          <span class="panel-title">Brah</span>
          <button
            id="header-call"
            type="button"
            class="header-call"
            disabled
            aria-pressed="false"
          >
            <svg
              class="header-call-icon"
              viewBox="0 0 24 24"
              width="14"
              height="14"
              fill="none"
              aria-hidden="true"
            >
              <path
                d="M6.6 10.8a15.5 15.5 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.25 11.4 11.4 0 0 0 3.6.58 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.46.58 3.6a1 1 0 0 1-.25 1z"
                fill="currentColor"
              />
            </svg>
            <span id="header-call-label">Call</span>
          </button>
        </header>
        <div id="app-menu" class="app-menu" hidden role="menu" aria-label="Brah menu">
          <button id="connect-openai" type="button" class="menu-item" role="menuitem">
            Connect OpenAI
          </button>
          <button id="agent-toggle" type="button" class="menu-item" role="menuitem">
            Agent
          </button>
          <button id="permissions-toggle" type="button" class="menu-item" role="menuitem">
            Permissions
          </button>
          <button id="window-minimize" type="button" class="menu-item" role="menuitem">
            Minimize
          </button>
          <button id="app-quit" type="button" class="menu-item" role="menuitem">
            Quit
          </button>
        </div>
        <section
          id="permissions-panel"
          class="permissions-panel"
          hidden
          aria-label="OS permissions"
        >
          <div class="view-header">
            <button id="permissions-back" type="button" class="view-back" aria-label="Back">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" aria-hidden="true">
                <path
                  d="M15 5l-7 7 7 7"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <strong class="view-title">OS permissions</strong>
            <button id="permissions-refresh" type="button">Refresh</button>
            <button id="diagnostics-open" type="button">Log</button>
          </div>
          <div id="permissions-list" class="permissions-list"></div>
        </section>
        <section id="agent-panel" class="agent-panel" hidden aria-label="Agent profile">
          <div class="view-header">
            <button id="agent-back" type="button" class="view-back" aria-label="Back">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" aria-hidden="true">
                <path
                  d="M15 5l-7 7 7 7"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
            <strong class="view-title">Agent</strong>
          </div>
          <form id="agent-form" class="agent-form">
            <label class="agent-field">
              <span class="agent-label">Your name</span>
              <input
                id="agent-name"
                type="text"
                class="agent-input"
                autocomplete="off"
                placeholder="What should I call you?"
                maxlength="80"
              />
            </label>
            <label class="agent-field">
              <span class="agent-label">Your goals</span>
              <textarea
                id="agent-goals"
                class="agent-textarea"
                rows="5"
                placeholder="One goal per line"
              ></textarea>
            </label>
          </form>
          <footer class="panel-footer">
            <span
              id="agent-status"
              class="panel-footer-text"
              role="status"
              aria-live="polite"
            ></span>
            <button id="agent-save" type="submit" form="agent-form" class="agent-save">Save</button>
          </footer>
        </section>
        <nav id="panel-tabs" class="panel-tabs" role="tablist" aria-label="Activity tabs"></nav>
        <div id="panel-body" class="panel-body" role="tabpanel"></div>
        <footer id="panel-footer" class="panel-footer">
          <label class="mic-picker">
            <svg
              class="mic-picker-icon"
              viewBox="0 0 24 24"
              width="13"
              height="13"
              fill="none"
              aria-hidden="true"
            >
              <path
                d="M12 3a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"
                stroke="currentColor"
                stroke-width="1.6"
              />
              <path
                d="M5 11a7 7 0 0 0 14 0M12 18v3"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
              />
            </svg>
            <select id="mic-select" class="mic-select" aria-label="Microphone">
              <option value="">Default microphone</option>
            </select>
          </label>
          <span
            id="openai-indicator"
            class="openai-indicator openai-indicator-footer"
            data-connected="false"
            >Offline</span
          >
        </footer>
      </section>
      <div id="call-stage" class="call-stage">
        <div id="call-meta" class="call-meta" aria-hidden="true">
          <span class="call-live"></span>
          <span id="call-timer" class="call-timer">0:00</span>
        </div>
        <button id="call-toggle" type="button" class="fab-orb" disabled aria-pressed="false">
          <span class="orb-shadow" aria-hidden="true"></span>
          <span class="siri-orb" aria-hidden="true">
            <span class="orb-aurora"></span>
            <span class="orb-surface"></span>
            <span class="orb-core"></span>
            <span class="orb-glow"></span>
            <span class="orb-sheen"></span>
          </span>
          <span id="call-label" class="call-label">Call</span>
        </button>
        <canvas id="call-wave" class="call-wave" aria-hidden="true"></canvas>
        <p id="status" class="status">Checking OpenAI…</p>
        <button id="call-end" type="button" class="call-end" aria-label="End call" disabled tabindex="-1">
          <span class="call-end-glyph" aria-hidden="true"></span>
          <span>End</span>
        </button>
        <div id="tool-activity" class="cu-card" hidden role="status" aria-live="polite">
          <div class="cu-head">
            <span class="cu-icon" aria-hidden="true"></span>
            <span class="cu-title">Computer use</span>
            <span id="tool-activity-target" class="cu-target">Browser</span>
          </div>
          <div class="cu-status-row">
            <span class="tool-activity-pulse" aria-hidden="true"></span>
            <span id="tool-activity-label" class="tool-activity-label">Working…</span>
          </div>
          <div class="cu-track"><span class="cu-track-fill"></span></div>
          <button id="tool-activity-stop" type="button" class="tool-activity-stop">End</button>
        </div>
      </div>
      <audio id="remote-audio" autoplay aria-label="Realtime assistant audio">
        <track kind="captions" label="Realtime captions are not displayed yet" />
      </audio>
    </main>
  </body>
</html>
